<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Locks zoom + handles notched screens (viewport-fit=cover) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <!-- Brand color for the mobile browser chrome -->
    <meta name="theme-color" content="#4F46E5" />
    <!-- SEO / social preview description -->
    <meta
      name="description"
      content="UTM Borrow — campus resource sharing for Universiti Teknologi Malaysia."
    />
    <!-- Preconnect to Google Fonts to cut font load latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- App fonts: Outfit (headings/UI) + IBM Plex Sans (body) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>UTM Borrow</title>
  </head>
  <body>
    <noscript>we need to enable JavaScript to run this app.</noscript>
    <!-- React mounts the whole app here -->
    <div id="root"></div>
  </body>
</html>
